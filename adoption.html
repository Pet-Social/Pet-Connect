<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Connect - Adoption</title>
    <meta name="description" content="Une application sociale ouverte pour animaux de compagnie : offrant un espace aux utilisateurs pour partager leurs moments spéciaux, en apprendre plus sur leurs animaux et un espace pour l'adoption d'animaux. " />
    <link href="https://fonts.googleapis.com/css2?family=outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="assets/images/default-pet.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">🐾 Pet Connect</a>
            <nav class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="adoption.html" class="active">Adoption</a>
                <a href="shop.html">Boutique</a>
                <a href="vets.html">Vétérinaires</a>
                <a href="tips.html">Conseils</a>
                <button id="theme-toggle" class="theme-toggle-btn" title="Changer le thème">
                    <span id="theme-icon">🌙</span>
                </button>
            </nav>
            <button id="auth-btn" class="btn-auth" title="Se connecter">
                <img src="assets/images/signUp/android-chrome-192x192.png" class="loginIcon" id="auth-icon" alt="Se connecter" />
            </button>
        </div>
    </header>

    <main class="container">
        <div class="text-center mb-4">
            <button id="toggleAdoptionBtn" class="submit-btn">
                <span>🐾 Proposer un animal à adopter</span>
            </button>
        </div>

        <section id="adoptionSection" class="card hidden">
            <h2 class="mb-4">Proposer un animal</h2>
            <form id="adoptionForm">
                <div class="form-group">
                    <label for="petName">Nom de l'animal</label>
                    <input type="text" id="petName" class="form-control" required placeholder="ex: Max" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="petAge">Âge (années)</label>
                    <input type="number" id="petAge" class="form-control" min="0" step="0.5" required placeholder="ex: 2.5" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="petType">Type</label>
                    <select id="petType" class="form-control">
                        <option value="Chat">Chat</option>
                        <option value="Chien">Chien</option>
                    </select>
                </div>
                <input type="hidden" id="contactPhone" value="">
                <div class="form-group">
                    <label>Statut vaccinal</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="vaxStatus" value="Vaccinated"> Vacciné
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="vaxStatus" value="Not Vaccinated" checked> Non vacciné
                        </label>
                    </div>
                    <div id="vaccineList" class="vax-list-container hidden">
                        <p class="vax-list-title">Sélectionnez les vaccins administrés:</p>
                        <label class="checkbox-label">
                            <input type="checkbox" name="vaccines" value="Rage"> Rage <small class="text-muted">(3 mois+)</small>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="vaccines" value="Vermifuge"> Vermifuge <small class="text-muted">(2 semaines+)</small>
                        </label>
                        <label class="checkbox-label dog-vax">
                            <input type="checkbox" name="vaccines" value="Maladie de Carré/Parvovirose"> Maladie de Carré/Parvovirose (DHLPP) <small class="text-muted">(6 semaines+)</small>
                        </label>
                        <label class="checkbox-label cat-vax hidden">
                            <input type="checkbox" name="vaccines" value="Typhus/Coryza"> Typhus/Coryza (Tricat) <small class="text-muted">(6 semaines+)</small>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="petImage">Photo de l'animal (optionnel)</label>
                    <input type="file" id="petImage" class="form-control" accept="image/*">
                </div>
                <div class="post-actions">
                    <button type="submit" class="btn">Mettre en adoption</button>
                    <button type="button" id="cancelAdoptionBtn" class="btn btn-secondary">Annuler</button>
                </div>
            </form>
        </section>

        <div id="adoptionList" class="grid-container"></div>
    </main>

    <footer>
        <p>© 2026 L2 INFO ISIMM.</p>
    </footer>

    <div id="authModal" class="modal-overlay hidden">
        <div class="auth-modal card">
            <button class="close-modal" id="closeAuthModal">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Connexion</button>
                <button class="auth-tab" id="signupTab">Inscription</button>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
            <form id="signupForm" class="auth-form hidden">
                <div class="form-group">
                    <label for="signupName">Nom d'utilisateur</label>
                    <input type="text" id="signupName" class="form-control" placeholder="JeanDupont" required>
                </div>
                <div class="form-group">
                    <label for="signupPhone">Numéro de téléphone</label>
                    <input type="tel" id="signupPhone" class="form-control" placeholder="06 12 34 56 78" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Mot de passe</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
            </form>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay hidden">
        <div class="profile-modal card">
            <button class="close-modal" id="closeProfileModal">&times;</button>
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">JD</div>
                <h2 id="profileUsername">Utilisateur</h2>
                <p id="profileEmail" class="profile-email">email@example.com</p>
            </div>
            <form id="profileForm" class="profile-form">
                <div class="form-group">
                    <label for="profileUsername">Nom d'utilisateur</label>
                    <input type="text" id="profileUsernameInput" class="form-control" placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmailInput" class="form-control" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="profilePhone">Téléphone</label>
                    <input type="tel" id="profilePhone" class="form-control" placeholder="06 12 34 56 78">
                </div>
                <div class="form-group">
                    <label for="profilePassword">Nouveau mot de passe</label>
                    <input type="password" id="profilePassword" class="form-control" placeholder="Laisser vide pour ne pas changer">
                </div>
                <button type="submit" class="btn btn-primary w-100">Mettre à jour</button>
            </form>
            <div class="profile-actions">
                <button id="logoutBtn" class="btn btn-secondary w-100">Déconnexion</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./adoption.js"></script>
    <script type="module" src="./index.js"></script>
</body>

</html>
