<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pet Connect</title>
        <meta
            name="description"
            content="An Open Pet Social App : That offer a space for users to share their special moments, learn more about their pets and a space for pet adoption. "
        />
        <!-- Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=outfit:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="./styles.css" />

        <link
            rel="icon"
            type="image/svg+xml"
            href="assets/images/default-pet.svg"
        />

        <!-- Preconnect to external domains-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    </head>
    <body>
        <header>
            <h1 style="size: 2.5em">Pet Connect</h1>
            <button
                class="theme-toggle"
                id="theme-toggle"
                aria-label="Toggle theme"
            >
                <span id="theme-icon">🌙</span>
            </button>
        </header>
        <footer>
            <p>© 2026 L2 INFO ISIMM.</p>
        </footer>

        <script>
            // 1. Theme Toggle Function
            function setupThemeToggle() {
                const themeToggle = document.getElementById("theme-toggle");
                const themeIcon = document.getElementById("theme-icon");
                const contributionsImg = document.querySelector(
                    "#contributions-graph img",
                );

                // Check for saved theme preference or default to dark
                const savedTheme = localStorage.getItem("theme") || "dark";
                document.documentElement.setAttribute("data-theme", savedTheme);
                updateThemeIcon(savedTheme);

                themeToggle.addEventListener("click", () => {
                    const currentTheme =
                        document.documentElement.getAttribute("data-theme");
                    const newTheme = currentTheme === "dark" ? "light" : "dark";

                    document.documentElement.setAttribute(
                        "data-theme",
                        newTheme,
                    );
                    localStorage.setItem("theme", newTheme);
                    updateThemeIcon(newTheme);
                });

                function updateThemeIcon(theme) {
                    themeIcon.textContent = theme === "dark" ? "🌙" : "☀️";
                }
            }
            setupThemeToggle();
        </script>
    </body>
</html>
