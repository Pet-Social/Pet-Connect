<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/images/default-pet.svg" type="image/x-icon" />
    <title>Pet Connect</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
        <style>
            html[data-theme='dark'],
            html[data-theme='dark'] body {
                background: #121212;
            }

            html[data-theme='light'],
            html[data-theme='light'] body {
                background: #f8f9fa;
            }
        </style>
    <meta name="description"
        content="Une application sociale ouverte pour animaux de compagnie : offrant un espace aux utilisateurs pour partager leurs moments spéciaux, en apprendre plus sur leurs animaux et un espace pour l'adoption d'animaux. " />
    <link href="https://fonts.googleapis.com/css2?family=outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="assets/images/default-pet.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">🐾 Pet Connect</a>
            <nav class="nav-links">
                <a href="index.html" class="active">Accueil</a>
                <a href="adoption.html">Adoption</a>
                <a href="shop.html">Boutique</a>
                <a href="vets.html">Vétérinaires</a>
                <a href="tips.html">Conseils</a>
                <button id="theme-toggle" class="theme-toggle-btn" title="Changer le thème">
                    <span id="theme-icon">🌙</span>
                </button>
            </nav>
            <button id="auth-btn" class="btn-auth" title="Se connecter">
                <img src="assets/images/signUp/android-chrome-192x192.png" class="loginIcon" id="auth-icon" alt="Se connecter" />
            </button>
        </div>
    </header>

    <main class="container">
        <div class="text-center mb-4">
            <br />
            <button class="submit-btn" id="togglePostBtn" style="margin: 0 auto">
                <span>📸 Partagez un moment avec votre animal</span>
            </button>
            <div class="posts-filter">
                <button class="filter-btn active" id="filterAll">Tous les posts</button>
                <button class="filter-btn" id="filterMy">Mes posts</button>
            </div>
            <section id="postsContainer" class="container"></section>
        </div>
        <section id="postSection" class="card hidden">
            <div id="postLoginPrompt" class="login-prompt-overlay">
                <div class="login-prompt-content">
                    <div class="login-prompt-icon">🔒</div>
                    <h3>Connexion requise</h3>
                    <p>Vous devez être connecté pour publier un moment.</p>
                    <button class="btn btn-primary" id="promptLoginBtn">Se connecter</button>
                </div>
            </div>
            <h2 class="mb-4">Créer une publication</h2>
            <form id="postForm">
                <div class="form-group">
                    <label for="postImage">Choisir une photo</label>
                    <label class="custum-file-upload" for="postImage">
                        <div class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-width="0" id="SVGRepo_bgCarrier"></g>
                                <g stroke-linejoin="round" stroke-linecap="round" id="SVGRepo_tracerCarrier"></g>
                                <g id="SVGRepo_iconCarrier">
                                    <path fill=""
                                        d="M10 1C9.73478 1 9.48043 1.10536 9.29289 1.29289L3.29289 7.29289C3.10536 7.48043 3 7.73478 3 8V20C3 21.6569 4.34315 23 6 23H7C7.55228 23 8 22.5523 8 22C8 21.4477 7.55228 21 7 21H6C5.44772 21 5 20.5523 5 20V9H10C10.5523 9 11 8.55228 11 8V3H18C18.5523 3 19 3.44772 19 4V9C19 9.55228 19.4477 10 20 10C20.5523 10 21 9.55228 21 9V4C21 2.34315 19.6569 1 18 1H10ZM9 7H6.41421L9 4.41421V7ZM14 15.5C14 14.1193 15.1193 13 16.5 13C17.8807 13 19 14.1193 19 15.5V16V17H20C21.1046 17 22 17.8954 22 19C22 20.1046 21.1046 21 20 21H13C11.8954 21 11 20.1046 11 19C11 17.8954 11.8954 17 13 17H14V16V15.5ZM16.5 11C14.142 11 12.2076 12.8136 12.0156 15.122C10.2825 15.5606 9 17.1305 9 19C9 21.2091 10.7909 23 13 23H20C22.2091 23 24 21.2091 24 19C24 17.1305 22.7175 15.5606 20.9844 15.122C20.7924 12.8136 18.858 11 16.5 11Z"
                                        clip-rule="evenodd" fill-rule="evenodd"></path>
                                </g>
                            </svg>
                        </div>
                        <div class="text">
                            <span id="imageStatusText">Sélectionnez votre image</span>
                        </div>
                        <input type="file" id="postImage" class="form-control" accept="image/*" required />
                    </label>
                    <p id="uploadStatus" class="status-msg"></p>
                </div>
                <div class="form-group">
                    <label for="postCaption">Écrire une légende</label>
                    <textarea id="postCaption" class="form-control"
                        placeholder="Que fait votre animal aujourd'hui ?"></textarea>
                </div>
                <div class="post-actions">
                    <button type="submit" class="btn">
                        Publier le moment
                    </button>
                    <button type="button" id="cancelPostBtn" class="btn btn-secondary">
                        Annuler
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 L2 INFO ISIMM.</p>
    </footer>

    <!-- Authentication Modal -->
    <div id="authModal" class="modal-overlay hidden">
        <div class="auth-modal card">
            <button class="close-modal" id="closeAuthModal">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Connexion</button>
                <button class="auth-tab" id="signupTab">Inscription</button>
            </div>
            
            <div id="authError" class="auth-error hidden">
                <span id="authErrorText"></span>
                <button type="button" class="auth-error-close" onclick="document.getElementById('authError').classList.add('hidden')">&times;</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form hidden">
                <div class="form-group">
                    <label for="signupName">Nom d'utilisateur</label>
                    <input type="text" id="signupName" class="form-control" placeholder="JeanDupont" required>
                </div>
                <div class="form-group">
                    <label for="signupPhone">Numéro de téléphone</label>
                    <input type="tel" id="signupPhone" class="form-control" placeholder="06 12 34 56 78" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Mot de passe</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
            </form>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal-overlay hidden">
        <div class="profile-modal card">
            <button class="close-modal" id="closeProfileModal">&times;</button>
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">JD</div>
                <h2 id="profileUsername">Utilisateur</h2>
                <p id="profileEmail" class="profile-email">email@example.com</p>
                <span id="adminStatus" class="admin-badge hidden">Admin</span>
            </div>
            <form id="profileForm" class="profile-form">
                <div class="form-group">
                    <label for="profileUsername">Nom d'utilisateur</label>
                    <input type="text" id="profileUsernameInput" class="form-control" placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmailInput" class="form-control" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="profilePhone">Téléphone</label>
                    <input type="tel" id="profilePhone" class="form-control" placeholder="06 12 34 56 78">
                </div>
                <div class="form-group">
                    <label for="profilePassword">Nouveau mot de passe</label>
                    <input type="password" id="profilePassword" class="form-control" placeholder="Laisser vide pour ne pas changer">
                </div>
                <button type="submit" class="btn btn-primary w-100">Mettre à jour</button>
            </form>
            <div class="profile-actions">
                <button id="logoutBtn" class="btn btn-secondary w-100">Déconnexion</button>
            </div>
        </div>
    </div>

    <!-- Edit Post Modal -->
    <div id="editPostModal" class="modal-overlay hidden">
        <div class="edit-post-modal card">
            <button class="close-modal" id="closeEditPostModal">&times;</button>
            <h2>Modifier le post</h2>
            <form id="editPostForm">
                <div class="form-group">
                    <label for="editPostCaption">Légende</label>
                    <textarea id="editPostCaption" class="form-control" placeholder="Que fait votre animal ?"></textarea>
                </div>
                <div class="post-actions">
                    <button type="submit" class="btn">Enregistrer</button>
                    <button type="button" id="deletePostBtn" class="btn btn-danger">Supprimer</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-secondary">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./index.js"></script>
</body>

</html>
